<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KRYZE MODE — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>

  <div class="wrapper">
    <div class="logo">
      <h1>KRYZE <span>MODE</span></h1>
      <p style="text-align: center; color: var(--muted2); letter-spacing: 2px; font-size: 12px; text-transform: uppercase;">Acceso Privado al Sistema</p>
    </div>

    <div class="card">
      <div class="field">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" placeholder="Ingresa tu usuario" autocomplete="off"/>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••"/>
      </div>

      <button class="btn" onclick="handleLogin()">
        Ingresar
      </button>

      <a href="./clientes.html" class="back-link">← Volver a la tienda</a>
    </div>
  </div>

  <footer>
        <div class="footer-container">
            <div class="footer-section">
                <h3>KRYZE MODE</h3>
                <p>Plataforma interna de gestión de inventario y pedidos.</p>
            </div>
            <div class="footer-section">
                <h3>Soporte Técnico</h3>
                <ul>
                    <li>📧 sysadmin@kryzemode.com</li>
                    <li>🔑 Código de Red: Activo</li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
            &copy; 2026 <span>Kryze Mode</span> — Panel de Control Corporativo.
        </div>
  </footer>

  <script src="/js/login.js"></script>
</body>
</html>
